<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="image"> 
        <img src="image.jpg">
        <div class="title"></div>
    </div>
    <div class="page">
        <div class="intro">
            <h1>Wellness Studio</h1>
            <p>Welcome to our health and wellness center! To continue please sign-up:</p>
        </div>
        <div class="form">
            <div>
                <label for="first_name">First Name:</label>
                <input type="text" id="first_name" name="first_name">
                
            </div>
            <div>
                <label for="last_name">Last Name:</label>
                <input type="text" id="last_name" name="last_name">
            </div>
            <div>
                <label for="email">E-mail Address:</label>
                <input type="email" id="email" name="email">
            </div>
            <div>
                <label for="phone">Phone Number:</label>
                <input type="number" minlength="8" maxlength="12" id="phone" name="phone">
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password"></div>
            <div>
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password"></div>
        </div>
        <div class="buttons">
            <button type="submit">Create account</button>
        </div>
        <div><p>Already have an account? <a>Sign-in</a></p></div>
    </div>
</body>
</html>
